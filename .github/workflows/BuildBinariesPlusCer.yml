name: Build Binaries
on:
  workflow_dispatch:
  push:
    paths-ignore:
      - 'Documents/**'
      - '**/*.md'
  pull_request:
    paths-ignore:
      - 'Documents/**'
      - '**/*.md'
jobs:
  build:
    runs-on: windows-latest
    env:
      POWERSHELL_TELEMETRY_OPTOUT: 1
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: 'recursive'
    - uses: microsoft/setup-msbuild@v3
    - name: Clear local NuGet cache (workaround for failed restores on windows-latest)
      run: dotnet nuget locals all --clear
    - name: Create self-signed certificate
      shell: pwsh
      run: |
        $cert = New-SelfSignedCertificate `
          -Type Custom `
          -Subject "CN=NanaZip Self-Signed" `
          -KeyUsage DigitalSignature `
          -FriendlyName "NanaZip" `
          -CertStoreLocation "Cert:\CurrentUser\My" `
          -TextExtension @("2.5.29.37={text}1.3.6.1.5.5.7.3.3", "2.5.29.19={text}")
        $pwd = ConvertTo-SecureString -String "SelfSignedCert123" -Force -AsPlainText
        Export-PfxCertificate -cert $cert -FilePath "$env:GITHUB_WORKSPACE\SelfSigned.pfx" -Password $pwd
        Export-Certificate -cert $cert -FilePath "$env:GITHUB_WORKSPACE\SelfSigned.cer"
        echo "CERT_THUMBPRINT=$($cert.Thumbprint)" >> $env:GITHUB_ENV
    - name: Build
      run: MSBuild -binaryLogger:Output\BuildAllTargets.binlog -m BuildAllTargets.proj
    - name: Sign MSIX Bundle
      shell: pwsh
      run: |
        $signtool = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits\10\bin" `
          -Recurse -Filter "signtool.exe" | `
          Where-Object { $_.FullName -match "x64" } | `
          Sort-Object FullName -Descending | `
          Select-Object -First 1 -ExpandProperty FullName
        $msixFiles = Get-ChildItem -Path "Output/Binaries/AppPackages" `
          -Recurse -Include "*.msix","*.msixbundle"
        foreach ($file in $msixFiles) {
          Write-Host "Signing: $($file.FullName)"
          & $signtool sign /fd SHA256 /a `
            /f "$env:GITHUB_WORKSPACE\SelfSigned.pfx" `
            /p "SelfSignedCert123" `
            $file.FullName
        }
    - name: Upload MSIX Bundle
      uses: actions/upload-artifact@v7
      with:
        name: NanaZip_Mainline_ApplicationPackages
        path: Output/Binaries/AppPackages
    - name: Upload Certificate
      uses: actions/upload-artifact@v7
      with:
        name: NanaZip_Mainline_Certificate
        path: SelfSigned.cer
    - name: Upload Extension Package Installer
      uses: actions/upload-artifact@v7
      with:
        name: NanaZip_Mainline_ExtensionPackageInstaller
        path: Output/NanaZip.ExtensionPackage_*.exe
    - name: Upload MSBuild Build Process Binary Log
      uses: actions/upload-artifact@v7
      if: '!cancelled()'
      with:
        name: NanaZip_Mainline_BuildBinaryLog
        path: Output/BuildAllTargets.binlog
    - name: Upload Portable Binaries
      uses: actions/upload-artifact@v7
      with:
        name: NanaZip_Mainline_PortableBinaries
        path: Output/Binaries/Root/Binaries
    - name: Upload Debug Symbols
      uses: actions/upload-artifact@v7
      with:
        name: NanaZip_Mainline_DebugSymbols
        path: Output/Binaries/Root/Symbols
